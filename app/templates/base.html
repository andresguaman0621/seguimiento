<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Seguimiento{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ asset_url('css/styles.css') }}">
</head>
<body>
  {% block body %}{% endblock %}

  <!-- Vue 3 desde CDN (global build) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <!-- Cliente HTTP compartido (fetch + JWT) -->
  <script src="{{ asset_url('js/shared/api.js') }}"></script>
  <!-- Set de iconos SVG en línea -->
  <script src="{{ asset_url('js/shared/icons.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
